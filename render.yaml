services:
  # Backend API Server
  - type: web
    name: codesprint-2026-api
    env: node
    region: singapore
    plan: free
    buildCommand: cd artifacts/api-server && pnpm install && pnpm run build
    startCommand: cd artifacts/api-server && pnpm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/hackathon.db
      - key: PROJECT_ROOT
        value: /opt/render/project/src
      - key: NODE_ENV
        value: production
    disk:
      name: codesprint-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # Frontend
  - type: web
    name: codesprint-2026-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: cd artifacts/hackathon && pnpm install && pnpm run build
    staticPublishPath: artifacts/hackathon/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
