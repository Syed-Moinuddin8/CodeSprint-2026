<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- QR Code Placeholder Background -->
  <rect width="300" height="300" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- QR Code Pattern (Simplified) -->
  <g fill="#000000">
    <!-- Top-left corner marker -->
    <rect x="20" y="20" width="60" height="60" fill="none" stroke="#000000" stroke-width="8"/>
    <rect x="36" y="36" width="28" height="28"/>
    
    <!-- Top-right corner marker -->
    <rect x="220" y="20" width="60" height="60" fill="none" stroke="#000000" stroke-width="8"/>
    <rect x="236" y="36" width="28" height="28"/>
    
    <!-- Bottom-left corner marker -->
    <rect x="20" y="220" width="60" height="60" fill="none" stroke="#000000" stroke-width="8"/>
    <rect x="36" y="236" width="28" height="28"/>
    
    <!-- Data pattern (simplified QR-like squares) -->
    <rect x="100" y="100" width="100" height="100" fill="#000000" opacity="0.1"/>
    
    <!-- Center decorative elements -->
    <rect x="120" y="100" width="10" height="10"/>
    <rect x="140" y="100" width="10" height="10"/>
    <rect x="160" y="100" width="10" height="10"/>
    <rect x="180" y="100" width="10" height="10"/>
    
    <rect x="100" y="120" width="10" height="10"/>
    <rect x="190" y="120" width="10" height="10"/>
    
    <rect x="100" y="140" width="10" height="10"/>
    <rect x="190" y="140" width="10" height="10"/>
    
    <rect x="100" y="160" width="10" height="10"/>
    <rect x="190" y="160" width="10" height="10"/>
    
    <rect x="100" y="180" width="10" height="10"/>
    <rect x="190" y="180" width="10" height="10"/>
    
    <rect x="120" y="190" width="10" height="10"/>
    <rect x="140" y="190" width="10" height="10"/>
    <rect x="160" y="190" width="10" height="10"/>
    <rect x="180" y="190" width="10" height="10"/>
  </g>
  
  <!-- Google Pay style center logo area -->
  <circle cx="150" cy="150" r="35" fill="white" stroke="#e5e7eb" stroke-width="3"/>
  
  <!-- Google Pay colors -->
  <path d="M135 145 L142 145 L142 155 L135 155 Z" fill="#4285f4"/>
  <path d="M145 140 L152 140 L152 160 L145 160 Z" fill="#34a853"/>
  <path d="M155 143 L162 143 L162 157 L155 157 Z" fill="#fbbc04"/>
  <path d="M165 145 L172 145 L172 155 L165 155 Z" fill="#ea4335"/>
  
  <!-- Text below -->
  <text x="150" y="280" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#6b7280">
    Scan to Pay ₹350
  </text>
</svg>
